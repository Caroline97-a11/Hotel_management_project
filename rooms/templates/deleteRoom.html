{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="alert alert-danger">
        <h4>Are you sure you want to delete Room {{ room.room_number }}?</h4>

        <form method="post">
            {% csrf_token %}
            <button class="btn btn-danger">Yes Delete</button>
            <a href="{% url 'roomsList' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
