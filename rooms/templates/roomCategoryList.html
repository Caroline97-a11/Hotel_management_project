{% extends 'base.html' %}

    {% block title %}
        Room Category List
    {% endblock  %}

    {% block content %}
    
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
                <tr>
                    <th>Room Name</th>
                    <th>Price</th>
                    <th class="text-center">Action</th>
                </tr>
            </thead>

            <tbody>
                {% for each in roomCategory %}
                <tr>
                    <td class="fw-semibold">{{ each.name }}</td>
                    <td class="fw-semibold">{{ each.price }}</td>
                    <td class="text-center">
                        <a href="" class="btn btn-outline-primary btn-modern d-inline-flex align-items-center gap-2">
                            <i class="bi bi-eye"></i>
                            View
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>

        </table>
    </div>
    {% endblock  %}
