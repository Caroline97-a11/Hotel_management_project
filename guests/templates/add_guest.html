{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
Guests
{% endblock %}

{% block content %}

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h3 class="text-center mb-3">Add a guest</h3>

            <form method="post" novalidate>
                {% csrf_token %}
                {{ form|crispy }}

                <button type="submit" class="btn btn-primary w-100">
                    Submit
                </button>
            </form>

        </div>
    </div>
</div>

{% endblock %}
