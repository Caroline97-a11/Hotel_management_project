{% extends 'base.html' %}
{% block content %}

<div class="container mt-4">
    <div class="d-flex justify-content-between">
        <h3>Guest Payments List</h3>

        <a href="{% url 'create_payment' %}" class="btn btn-primary mb-3">Add Payment</a>
    </div>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Guest</th>
                <th>Room</th>
                <th>Amount</th>
                <th>Type</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            {% for p in payments %}
            <tr>
                <td>{{ p.guest }}</td>
                <td>{{ p.room }}</td>
                <td>{{ p.amount|floatformat:2 }}</td>
                <td>{{ p.payment_type }}</td>
                <td>{{ p.payment_date }}</td>
                <td>
                    <a href="{% url 'edit_payment' p.id %}" class="btn btn-warning btn-sm">Edit</a>
                    <a href="{% url 'delete_payment' p.id %}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
