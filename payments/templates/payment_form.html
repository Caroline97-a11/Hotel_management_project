{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}

<div class="container mt-4">
    <h3>Payment Form</h3>

    <form method="POST" novalidation>
        {% csrf_token %}
        {{ form|crispy }}

        <button class="btn btn-success mt-3">Save</button>
    </form>
</div>

{% endblock %}
