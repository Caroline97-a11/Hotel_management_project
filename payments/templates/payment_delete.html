{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">

    <h4>Are you sure you want to delete this payment?</h4>

    <form method="POST">
        {% csrf_token %}
        <button class="btn btn-danger">Yes Delete</button>
        <a href="{% url 'payment_list' %}" class="btn btn-secondary">Cancel</a>
    </form>

</div>
{% endblock %}
