<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hotel management{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
   
<nav class="nav nav-pills flex-column flex-sm-row p-2 shadow-sm rounded bg-dark border-bottom border-secondary mb-5">
  <a class="flex-sm-fill text-sm-center nav-link text-white-50 p-3 active-custom" href="#">
    <i class="fas fa-hotel me-2"></i>Hotel Management
  </a>
  <a class="flex-sm-fill text-sm-center nav-link text-white-50 p-3" href="#">
    <i class="fas fa-bed me-2"></i>Rooms
  </a>
  <a class="flex-sm-fill text-sm-center nav-link text-white-50 p-3" href="#">
    <i class="fas fa-users me-2"></i>Guests
  </a>
  <a class="flex-sm-fill text-sm-center nav-link text-white-50 p-3" href="#">
    <i class="fas fa-credit-card me-2"></i>Payments
  </a>
  <a class="flex-sm-fill text-sm-center nav-link text-white-50 p-3" href="#">
    <i class="fas fa-chart-line me-2"></i>Reports
  </a>
</nav>
{% block content %}

 {% endblock %}

</body>
</html>
